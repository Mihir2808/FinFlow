apiVersion: v1
kind: Secret
metadata:
  name: finflow-secrets
  namespace: finflow
type: Opaque
# Values must be base64-encoded: echo -n "value" | base64
# Replace with your actual secrets before applying
stringData:
  DB_PASSWORD: finflow-db-password-change-in-production
  JWT_SECRET: finflow-jwt-secret-at-least-32-chars-change-in-production
