apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finflow
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: auth-service
          image: finflow/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres-service:5432/finflow
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finflow-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: finflow-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: finflow-config
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finflow
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: finflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
