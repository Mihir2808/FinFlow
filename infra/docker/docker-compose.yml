services:

  # ─── Databases ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow
      POSTGRES_DB: finflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Messaging ──────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment-created              --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment-approved             --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment-rejected             --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud-analysis-requested     --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud-analysis-completed     --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification-requested       --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment-created.DLQ          --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud-analysis-requested.DLQ --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── Services ───────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../..
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      WALLET_SERVICE_URL: http://wallet-service:8083
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-finflow-super-secret-key-change-in-production-32chars}
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started

  auth-service:
    build:
      context: ../..
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      JWT_SECRET: ${JWT_SECRET:-finflow-super-secret-key-change-in-production-32chars}
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: ../..
      dockerfile: payment-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      WALLET_SERVICE_URL: http://wallet-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      wallet-service:
        condition: service_started
      kafka:
        condition: service_healthy

  wallet-service:
    build:
      context: ../..
      dockerfile: wallet-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
    depends_on:
      postgres:
        condition: service_healthy

  fraud-service:
    build:
      context: ../..
      dockerfile: fraud-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ../..
      dockerfile: notification-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  audit-service:
    build:
      context: ../..
      dockerfile: audit-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finflow
      DB_USERNAME: finflow
      DB_PASSWORD: finflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────────────────────────────

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
